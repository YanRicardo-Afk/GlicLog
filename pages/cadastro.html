<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GlicoLog — Criar conta</title>
  <link rel="stylesheet" href="../css/styleLogin.css">
</head>
<body>

  <main class="app">
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2"/><path d="M12 6v6l4 2"/></svg>
      </div>
      <div>
        <div class="brand-name">GlicoLog</div>
        <div class="brand-sub">Diário glicêmico</div>
      </div>
    </div>

    <div class="card">
      <div class="glucose-bar">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#3D8B6E" stroke-width="2.5" stroke-linecap="round">
          <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        <span>Crie sua conta gratuitamente</span>
      </div>

      <h1 class="card-title">Criar conta</h1>
      <p class="card-sub">Comece a monitorar sua glicemia hoje</p>

      <div id="cad-toast" class="toast" role="alert" aria-live="polite"></div>

      <div class="field">
        <label for="cad-nome">Nome completo</label>
        <input type="text" id="cad-nome" placeholder="João Silva" autocomplete="name">
        <span class="field-error" id="err-cad-nome">Nome é obrigatório</span>
      </div>

      <div class="field">
        <label for="cad-email">E-mail</label>
        <input type="email" id="cad-email" placeholder="seu@email.com" autocomplete="email">
        <span class="field-error" id="err-cad-email">Insira um e-mail válido</span>
      </div>

      <div class="row-2">
        <div class="field">
          <label for="cad-senha">Senha</label>
          <input type="password" id="cad-senha" placeholder="••••••••" autocomplete="new-password">
          <div class="strength-bar">
            <div class="strength-seg" id="s1"></div>
            <div class="strength-seg" id="s2"></div>
            <div class="strength-seg" id="s3"></div>
            <div class="strength-seg" id="s4"></div>
          </div>
          <span class="strength-label" id="strength-label"></span>
          <span class="field-error" id="err-cad-senha">Mínimo 6 caracteres</span>
        </div>

        <div class="field">
          <label for="cad-confirma">Confirmar</label>
          <input type="password" id="cad-confirma" placeholder="••••••••" autocomplete="new-password">
          <span class="field-error" id="err-cad-confirma">As senhas não coincidem</span>
        </div>
      </div>

      <button class="btn-primary" id="btn-cadastro" type="button">Criar conta</button>

      <div class="divider"><hr><span>ou</span><hr></div>

      <p class="link-row">
        Já tem conta? <a href="login.html">Entrar</a>
      </p>
    </div>
  </main>

  <script src="../js/cadastro.js"></script>
</body>
</html>
