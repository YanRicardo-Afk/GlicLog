<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>GlicoLog — Novo Registro</title>

    <link rel="stylesheet" href="../css/styleLogin.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/registro.css">
</head>

<body>

    <header class="topbar">
        <div class="topbar-brand">
            <div class="brand-icon">
                <svg viewBox="0 0 24 24">
                    <path d="M12 2C12 2 5 9 5 14a7 7 0 0 0 14 0c0-5-7-12-7-12z"/>
                </svg>
            </div>
            <span class="brand-name">GlicoLog</span>
        </div>

        <nav class="topbar-nav">
            <a href="dashboard.html" class="nav-link">Início</a>
            <a href="historico.html" class="nav-link">Histórico</a>
            <a href="perfil.html" class="nav-link">Perfil</a>
        </nav>
    </header>

    

    <main class="dashboard-layout">
        <section>
            <h1 class="card-title">Novo Registro</h1>
            <p class="card-sub">Registre sua medição glicêmica.</p>
        </section>

        <section class="card registro-card">
            <div class="toast" id="toast"></div>

            <form id="registroForm">
                <div class="field">
                    <label for="glicemia">Glicemia (mg/dL)</label>
                    <input type="number" id="glicemia" placeholder="Ex.: 126" required>
                    <span class="field-error">Informe um valor válido</span>
                </div>

                <div class="row-2">
                    <div class="field">
                        <label for="tipo">Tipo</label>
                        <select id="tipo">
                            <option value="">Selecionar</option>
                            <option>Jejum</option>
                            <option>Pré refeição</option>
                            <option>Pós refeição</option>
                            <option>Dormir</option>
                        </select>
                    </div>

                    <div class="field">
                        <label for="hora">Horário</label>
                        <input type="time" id="hora" required>
                    </div>
                </div>

                <div class="field">
                    <label for="refeicao">Refeição</label>
                    <input type="text" id="refeicao" placeholder="Opcional">
                </div>

                <div class="field">
                    <label for="obs">Observações</label>
                    <textarea id="obs" rows="4" placeholder="Opcional"></textarea>
                </div>

                <button class="btn-primary">Salvar Registro</button>
            </form>
        </section>
    </main>

    <script src="../js/registro.js"></script>

</body>
</html>
