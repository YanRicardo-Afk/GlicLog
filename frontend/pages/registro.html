<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>GlicoLog — Novo Registro</title>

    <link rel="stylesheet" href="../css/styleLogin.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/registro.css">
</head>

<body>

    <!-- Botão voltar isolado conforme seu objetivo visual -->
    <div class="header-minimal">
        <a href="dashboard.html" class="back-link-minimal" aria-label="Voltar para o início">
            <div class="back-icon-arrow" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </div>
            <span class="back-text-minimal">Voltar</span>
        </a>
    </div>

    <main class="dashboard-layout">
        <!-- Alterado para div para evitar o aviso de seção sem cabeçalho -->
        <div class="registration-header-container">
            <h1 class="card-title">Novo Registro</h1>
            <p class="card-sub">Registre sua medição glicêmica.</p>
        </div>

        <!-- Alterado de section para div para corrigir o Warning do W3C -->
        <div class="card registro-card">
            <div class="toast" id="toast"></div>

            <form id="registroForm">
                <div class="field">
                    <label for="glicemia">Glicemia (mg/dL)</label>
                    <input type="number" id="glicemia" placeholder="Ex.: 126" required>
                    <span class="field-error">Informe um valor válido</span>
                </div>

                <div class="row-2">
                    <div class="field">
                        <label for="tipo">Tipo</label>
                        <select id="tipo">
                            <option value="">Selecionar</option>
                            <option>Jejum</option>
                            <option>Pré refeição</option>
                            <option>Pós refeição</option>
                            <option>Dormir</option>
                        </select>
                    </div>

                    <div class="field">
                        <label for="hora">Horário</label>
                        <input type="time" id="hora" required>
                    </div>
                </div>

                <div class="field">
                    <label for="refeicao">Refeição</label>
                    <input type="text" id="refeicao" placeholder="Opcional">
                </div>

                <div class="field">
                    <label for="obs">Observações</label>
                    <textarea id="obs" rows="4" placeholder="Opcional"></textarea>
                </div>

                <button class="btn-primary">Salvar Registro</button>
            </form>
        </div>
    </main>

    <script src="../js/registro.js"></script>

</body>
</html>
